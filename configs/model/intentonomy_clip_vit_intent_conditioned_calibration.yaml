_target_: src.models.intentonomy_clip_vit_intent_conditioned_calibration_module.IntentonomyClipViTIntentConditionedCalibrationModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-3
  weight_decay: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 50
  eta_min: 1e-6

net:
  _target_: src.models.components.clip_vit_intent_conditioned_calibration.ClipVisionTransformerIntentConditionedCalibration
  num_classes: 28
  pretrained: true
  image_size: 224
  clip_model_name: "ViT-L/14"
  layer_idx: 24
  intent_description_mode: "llm"
  intent_gemini_file: null
  intent_descriptions: null
  prompt_template: "A photo that expresses the intent of {}."
  lambda_init: 0.1
  use_vector_lambda: false
  mlp_hidden_dim: null
  use_logit_correlation: false

num_classes: 28

criterion:
  _target_: src.models.components.aslloss.AsymmetricLossOptimized
  gamma_neg: 2
  gamma_pos: 0
  clip: 0.05
  eps: 1e-5
  disable_torch_grad_focal_loss: false

freeze_backbone: true
unfreeze_last_n_blocks: 0
compile: true

use_ema: true
ema_decay: 0.9997

intent_loss_weight_warmup_epochs: 2
intent_loss_weight_warmup: 0.2
intent_loss_weight_normal: 1.0
