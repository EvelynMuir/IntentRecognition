_target_: src.models.intentonomy_clip_vit_icrn_module.IntentonomyClipViTICRNModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-3
  weight_decay: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 50
  eta_min: 1e-6

net:
  _target_: src.models.components.clip_vit_icrn.ClipVisionTransformerICRN
  num_classes: 28
  pretrained: true
  image_size: 224
  clip_model_name: "ViT-L/14"
  concept_list: null
  concepts_file: /home/evelynmuir/lambda/projects/IntentRecognition/Intentonomy/data/concepts.json
  intent2concepts_file: /home/evelynmuir/lambda/projects/IntentRecognition/Intentonomy/data/intent2concepts.json
  concept_prompt_template: "A photo of {}."
  use_cls_patch_concat: true
  l2_normalize_visual: true
  use_visual_adapter: true
  adapter_hidden_ratio: 0.25
  adapter_dropout: 0.1
  renormalize_after_adapter: true
  concept_temperature: 0.2
  graph_use_relu: false
  graph_temperature: 1.0
  graph_topk: 16
  graph_residual_alpha: 0.5
  base_dropout: 0.1
  base_hidden_dim: null
  base_layer_idx: 24
  alpha_init: 0.0
  cls_mean_patch_ckpt_path: null
  init_with_llm_prior: true
  intent_gemini_file: null
  intent_descriptions: null
  intent_prompt_template: "A photo that expresses the intent of {}."

num_classes: 28

criterion:
  _target_: src.models.components.aslloss.AsymmetricLossOptimized
  gamma_neg: 2
  gamma_pos: 0
  clip: 0.05
  eps: 1e-5
  disable_torch_grad_focal_loss: false

freeze_backbone: true
unfreeze_last_n_blocks: 0
compile: true

use_ema: true
ema_decay: 0.9997

intent_loss_weight_warmup_epochs: 2
intent_loss_weight_warmup: 0.2
intent_loss_weight_normal: 1.0

use_prior_regularization: true
lambda_prior: 0.1
prior_regularization_start_epoch: 0
use_sparse_regularization: false
lambda_sparse: 0.01

lr_base_head: 1e-4
lr_concept_branch: 5e-4
lr_alpha: 1e-3
use_alpha_regularization: true
lambda_alpha_nonneg: 0.05
lambda_alpha_l2: 0.001
