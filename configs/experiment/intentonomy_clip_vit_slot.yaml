# @package _global_

# to execute this experiment run:
# python src/train.py experiment=intentonomy_clip_vit_slot

defaults:
  - override /data: intentonomy
  - override /model: intentonomy_clip_vit_slot
  - override /callbacks: default
  - override /trainer: default

tags: ["intentonomy", "clip-vit", "slot-attention", "intent-conditioned"]

callbacks:
  model_checkpoint:
    monitor: val/f1_mean
    mode: max

  early_stopping:
    monitor: val/f1_mean
    mode: max
    patience: 10

data:
  batch_size: 1024
  binarize_softprob: true

logger:
  tensorboard:
    name: "Intentonomy-CLIP-ViT-IntentSlot"

model:
  use_cls_fusion: false
  use_proto_classifier: false
  use_decoupled_classifier: false
  use_late_fusion: false
  net:
    clip_model_name: "ViT-L/14"
    selected_layers: [12, 18, 24]
    num_slots: 4
    slot_iters: 3
    use_cls_token: false
    use_intent_conditioning: true
    trainable_intent_queries: true
    freeze_backbone: true
  slot_orthogonality_weight: 0.1
