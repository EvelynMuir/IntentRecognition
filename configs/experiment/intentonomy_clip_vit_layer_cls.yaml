# @package _global_

# to execute this experiment run:
# python src/train.py experiment=intentonomy_clip_vit_layer_cls model.layer_idx=1

defaults:
  - override /data: intentonomy
  - override /model: intentonomy_clip_vit_layer_cls
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["intentonomy", "clip-vit", "layer-cls", "mlp"]

callbacks:
  model_checkpoint:
    monitor: val/f1_macro
    mode: max

  early_stopping:
    monitor: val/f1_macro
    mode: max
    patience: 10

  # Confusion matrix callback
  confusion_matrix:
    _target_: src.callbacks.confusion_matrix_callback.ConfusionMatrixCallback
    annotation_file: null  # Will auto-detect from default location
    output_filename: "confusion_matrix.png"
    show_values: true
    dpi: 300

data:
  batch_size: 1024

logger:
  tensorboard:
    name: "Intentonomy-CLIP-ViT-Layer1"  # Can be overridden via command line: logger.tensorboard.name="Intentonomy-CLIP-ViT-Layer5"
