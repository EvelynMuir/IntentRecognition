_target_: src.models.intentonomy_clip_vit_uabl_module.IntentonomyClipViTUABLModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-3
  weight_decay: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 50
  eta_min: 1e-6

net:
