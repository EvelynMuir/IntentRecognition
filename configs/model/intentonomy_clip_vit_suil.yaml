_target_: src.models.intentonomy_clip_vit_suil_module.IntentonomyClipViTSUILModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 5e-3
  weight_decay: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 50
  eta_min: 1e-6

net:
  _target_: src.models.components.clip_vit_layer_cls_patch_mean.ClipVisionTransformerLayerClsPatchMean
  num_classes: 28
  pretrained: true
  image_size: 224
  clip_model_name: "ViT-L/14"
  layer_idx: 24

num_classes: 28

layer_idx: 24

criterion:
  _target_: src.models.components.aslloss.AsymmetricLossOptimized
  gamma_neg: 2
  gamma_pos: 0
  clip: 0.05
  eps: 1e-5
  disable_torch_grad_focal_loss: false

freeze_backbone: true
compile: true

use_ema: false
ema_decay: 0.9997

intent_loss_weight_warmup_epochs: 2
intent_loss_weight_warmup: 0.2
intent_loss_weight_normal: 1.0

use_confidence_aware_supervision: true
force_binarize_targets: true
confidence_mapping: "discrete"
confidence_lambda: 0.4
confidence_score_low: 0.3333333333
confidence_score_mid: 0.6666666667
confidence_score_high: 1.0
confidence_weight_low: 1.0
confidence_weight_mid: 1.15
confidence_weight_high: 1.3

use_hierarchy_regularization: true
hierarchy_aggregation: "noisy_or"
hierarchy_margin: 0.0
hierarchy_loss_weight: 0.1
use_coarse_auxiliary_loss: false
hierarchy_coarse_loss_weight: 0.0

use_classwise_calibration: true
calibration_mode: "bias"
calibration_lr: 1e-3
calibration_regularization_weight: 1e-4
initial_calibration_bias: 0.0
initial_calibration_scale: 1.0
use_learned_thresholds_for_eval: true
