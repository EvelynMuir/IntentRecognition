# @package _global_

# to execute this experiment run:
# python src/train.py experiment=intentonomy_clip_vit_layer_cls_patch_mean model.layer_idx=24

defaults:
  - override /data: intentonomy
  - override /model: intentonomy_clip_vit_layer_cls_patch_mean
  - override /callbacks: default
  - override /trainer: default
  - override /logger: tensorboard

tags: ["intentonomy", "clip-vit", "layer-cls-patch-mean", "mlp"]

callbacks:
  model_checkpoint:
    monitor: val/f1_macro
    mode: max

  early_stopping:
    monitor: val/f1_macro
    mode: max
    patience: 10

trainer:
  max_epochs: 80
  gradient_clip_val: 1.0
  num_sanity_val_steps: 0

data:
  batch_size: 64
  binarize_softprob: true

model:
  layer_idx: 12
  net:
    clip_model_name: "ViT-B/32"
  optimizer:
    lr: 2e-4

logger:
  tensorboard:
    name: "Intentonomy-CLIP-ViT-Layer12-ClsPatchMean"
